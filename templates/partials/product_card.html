{# 상품 카드 (US-015) — 사용: {% include "partials/product_card.html" %} (변수 p) #}
<a class="product-card" href="{{ url_for('product_detail', slug=p.slug) }}">
  <div class="pc-thumb">
    <span class="pc-placeholder">☯</span>
    {% if p.thumbnail %}
      <img src="{{ url_for('static', filename='img/products/' + p.thumbnail) }}"
           alt="{{ p.name }}" loading="lazy"
           onerror="this.remove()">
    {% endif %}
    <span class="pc-cat">{{ p.category }}</span>
  </div>
  <div class="pc-body">
    <span class="pc-character">{{ p.character_name }}</span>
    <h3 class="pc-name">{{ p.name }}</h3>
    <p class="pc-tagline">{{ p.tagline }}</p>
    <span class="pc-price {{ 'free' if p.price == 0 }}">
      {{ "무료" if p.price == 0 else "{:,}원".format(p.price) }}
    </span>
  </div>
</a>
