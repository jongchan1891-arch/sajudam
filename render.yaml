# Render Blueprint — https://render.com/docs/blueprint-spec
# 대시보드에서 New → Blueprint → 이 저장소 선택 → Apply 하면 자동 배포됩니다.
services:
  - type: web
    name: sajudam
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
